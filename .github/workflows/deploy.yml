---
name: Deploy

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    uses: ./.github/workflows/test.yml

  build:
    name: Build and release
    runs-on: ${{ matrix.os }}
    needs: test

    strategy:
      matrix:
        include:
          - build: linux
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl

          - build: macos
            os: macos-latest
            target: x86_64-apple-darwin

          - build: windows
            os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get the release version from the tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - run: sudo apt -y install musl-dev musl-tools
        if: matrix.build == 'linux'

      - name: Install `cargo-generate-rpm` and `cargo-deb`
        if: matrix.build == 'linux'
        run: |
          cargo install cargo-generate-rpm
          cargo install cargo-deb

      - name: Build Linux
        run: |
          cargo build --release --locked --target ${{ matrix.target }}
        if: matrix.build == 'linux'

      - name: Generate RPM and DEB
        if: matrix.build == 'linux'
        run: |
          ls -alR target/${{ matrix.target }}/release/epazote
          # Create target/release directory if it doesn't exist (it might not if only cross-compiled)
          mkdir -p target/release
          cp target/${{ matrix.target }}/release/epazote ./target/release/epazote
          strip -s ./target/release/epazote

          # RPM
          cargo generate-rpm
          ls -alR target/generate-rpm
          RPM_PATH=$(find target/generate-rpm/ -name "*.rpm" -print -quit)
          echo "RPM_ASSET=$RPM_PATH" >> $GITHUB_ENV

          # DEB
          # We use --no-build because we already built it.
          # We don't pass --target to cargo deb because it might try to look in target/{target}/release
          # but our Cargo.toml points to target/release/epazote.
          # Actually, cargo-deb defaults might override Cargo.toml if we pass --target?
          # Let's try running it simply since we moved the binary to target/release/epazote where Cargo.toml expects it.
          # But cargo-deb calculates architecture from target.
          # If we are on x86_64 linux and target is x86_64-unknown-linux-musl, cargo deb might default to gnu or something?
          # Ideally we tell cargo deb the architecture.
          cargo deb --no-build --target ${{ matrix.target }}

          # Find the generated deb
          # It usually goes to target/{target}/debian/
          ls -alR target
          DEB_PATH=$(find target -name "*.deb" -print -quit)
          echo "DEB_ASSET=$DEB_PATH" >> $GITHUB_ENV

      - name: Build
        run: |
          cargo build --release --locked --target ${{ matrix.target }}
        if: matrix.build != 'linux'

      - name: Build archive
        shell: bash
        run: |
          binary_name="epazote"

          dirname="$binary_name-${{ env.VERSION }}-${{ matrix.target }}"
          mkdir "$dirname"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            mv "target/${{ matrix.target }}/release/$binary_name.exe" "$dirname"
          else
            mv "target/${{ matrix.target }}/release/$binary_name" "$dirname"
          fi

          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a "$dirname.zip" "$dirname"
            echo "ASSET=$dirname.zip" >> $GITHUB_ENV
          else
            tar -czf "$dirname.tar.gz" "$dirname"
            echo "ASSET=$dirname.tar.gz" >> $GITHUB_ENV
          fi

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |-
            ${{ env.ASSET }}
            ${{ env.RPM_ASSET }}
            ${{ env.DEB_ASSET }}

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - run: cargo publish --token ${CRATES_TOKEN}
        env:
          CRATES_TOKEN: ${{ secrets.CRATES_TOKEN }}
